name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: heimdal-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: heimdal-darwin-amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: heimdal-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: heimdal-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl cross-compilation tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/heimdal .
          tar czf ${{ matrix.artifact }}.tar.gz heimdal
          rm heimdal
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            sha256sum *.tar.gz >> ../checksums.txt
            cd ..
          done
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        id: create_release
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: false

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: limistah/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Compute new SHAs and update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/limistah/heimdal/releases/download/${GITHUB_REF_NAME}"

          ARM_SHA=$(curl -fsSL "${BASE_URL}/checksums.txt" | grep "darwin-arm64" | awk '{print $1}')
          AMD_SHA=$(curl -fsSL "${BASE_URL}/checksums.txt" | grep "darwin-amd64" | awk '{print $1}')

          cd homebrew-tap

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/heimdal.rb

          # Update arm64 URL and sha
          sed -i "s|releases/download/v[^/]*/heimdal-darwin-arm64|releases/download/${GITHUB_REF_NAME}/heimdal-darwin-arm64|" Formula/heimdal.rb

          # Update amd64 URL and sha
          sed -i "s|releases/download/v[^/]*/heimdal-darwin-amd64|releases/download/${GITHUB_REF_NAME}/heimdal-darwin-amd64|" Formula/heimdal.rb

          # Update SHAs — assumes formula has comments "# arm64" and "# amd64"
          # Use Python for reliable multi-line sed
          python3 - <<'PYEOF'
          import re, os

          with open('Formula/heimdal.rb', 'r') as f:
              content = f.read()

          arm_sha = os.environ['ARM_SHA']
          amd_sha = os.environ['AMD_SHA']

          # Replace sha256 lines with # arm64 / # amd64 comments
          content = re.sub(r'sha256 "[^"]*" # arm64', f'sha256 "{arm_sha}" # arm64', content)
          content = re.sub(r'sha256 "[^"]*" # amd64', f'sha256 "{amd_sha}" # amd64', content)

          with open('Formula/heimdal.rb', 'w') as f:
              f.write(content)
          PYEOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git diff --quiet || git commit -am "chore: update heimdal to ${VERSION}"
          git push
        env:
          ARM_SHA: ${{ env.ARM_SHA }}
          AMD_SHA: ${{ env.AMD_SHA }}
