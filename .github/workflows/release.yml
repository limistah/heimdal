name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: heimdal

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: heimdal-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: heimdal-darwin-amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: heimdal-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: heimdal-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          # For aarch64 cross-compilation
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz ${{ env.BINARY_NAME }}
          cd ../../..
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums file
        run: |
          cd artifacts
          find . -name "*.tar.gz" | sort | while read f; do
            # Extract just filename from path
            fname=$(basename "$f")
            sha256sum "../artifacts/$(dirname $f)/$fname" | awk '{print $1 "  " $2}' >> ../checksums.txt
          done || true
          # Alternative approach
          cat /dev/null > ../checksums.txt
          for dir in */; do
            for file in "$dir"*.tar.gz; do
              [ -f "$file" ] && sha256sum "$file" >> ../checksums.txt
            done
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            checksums.txt
          body: |
            ## Installation

            ### Homebrew (macOS/Linux)
            ```bash
            brew tap limistah/tap
            brew install limistah/tap/heimdal
            ```

            ### Direct download
            ```bash
            curl -fsSL https://raw.githubusercontent.com/limistah/heimdal/main/install.sh | bash
            ```

            ### Cargo
            ```bash
            cargo install heimdal
            ```

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update Formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/limistah/homebrew-tap.git
          cd homebrew-tap

          VERSION_NUM="${VERSION#v}"
          ARM64_URL="https://github.com/limistah/heimdal/releases/download/${VERSION}/heimdal-darwin-arm64.tar.gz"
          AMD64_URL="https://github.com/limistah/heimdal/releases/download/${VERSION}/heimdal-darwin-amd64.tar.gz"

          ARM64_SHA=$(curl -sL "${ARM64_URL}" | sha256sum | cut -d' ' -f1)
          AMD64_SHA=$(curl -sL "${AMD64_URL}" | sha256sum | cut -d' ' -f1)

          cat > Formula/heimdal.rb <<FORMULA
          class Heimdal < Formula
            desc "Universal dotfile and system configuration manager"
            homepage "https://github.com/limistah/heimdal"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_arm do
                url "${ARM64_URL}"
                sha256 "${ARM64_SHA}"
              end
              on_intel do
                url "${AMD64_URL}"
                sha256 "${AMD64_SHA}"
              end
            end

            def install
              bin.install "heimdal"
            end

            test do
              assert_match "heimdal", shell_output("#{bin}/heimdal --version")
            end
          end
          FORMULA

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/heimdal.rb
          git diff --cached --quiet || git commit -m "Update heimdal to ${VERSION}"
          git push
