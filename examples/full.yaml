# Full-Featured Heimdal Configuration

heimdal:
  version: "1"
  repo: "git@github.com:yourusername/dotfiles.git"  # Optional: can be specified or stored in state

# Global ignore patterns (applied to all profiles)
ignore:
  - .git
  - .gitignore
  - heimdal.yaml
  - "*.md"
  - LICENSE
  - .DS_Store

# Global package definitions (available to all profiles)
packages:
  # Common packages (manually installed via package managers)
  common:
    - git
    - vim
    - tmux
    - curl
    - wget
    - tree
    - fzf
    - ripgrep
    - bat
    - fd
    - zoxide

  # Homebrew packages (macOS)
  homebrew:
    - neovim
    - gh
    - node
    - python

  # Homebrew casks (macOS GUI apps)
  homebrew_casks:
    - iterm2
    - visual-studio-code
    - docker
    - slack
    - firefox

  # Mac App Store (requires mas-cli)
  # Format: { "id": <number>, "name": "<app-name>" }
  mas:
    - { "id": 497799835, "name": "Xcode" }
    - { "id": 1352778147, "name": "Bitwarden" }

  # APT packages (Debian/Ubuntu)
  apt:
    - build-essential
    - python3-pip
    - python3-venv

  # DNF packages (Fedora/RHEL/CentOS)
  dnf:
    - gcc
    - make
    - python3-devel

  # Pacman packages (Arch/Manjaro)
  pacman:
    - base-devel
    - python-pip

  # APK packages (Alpine)
  apk:
    - build-base
    - python3

# History tracking configuration (optional)
history:
  enabled: true
  sync: true
  max_age_days: 90

# Machine profiles
profiles:
  # Base profile for all machines
  base:
    # Dotfile entries: simple strings or mappings with custom targets
    dotfiles:
      - .vimrc
      - .tmux.conf
      - .gitconfig
      # Mapped entry with custom target
      - source: config/nvim
        target: ~/.config/nvim

    # Profile-specific ignore patterns (in addition to global)
    ignore:
      - "*.swp"
      - "*.swo"
      - "*.tmp"

    # Lifecycle hooks
    hooks:
      post_apply:
        - command: "echo 'Heimdal setup complete!'"
          description: "Success message"
      pre_sync:
        # Simple hook (just a command string)
        - "git status"

    # Template files with variable substitution
    templates:
      - src: templates/gitconfig.j2
        dest: ~/.gitconfig.local
        vars:
          email: "user@example.com"
          name: "Your Name"

  # Work laptop (macOS) - extends base profile
  work-laptop:
    extends: base
    # Additional packages for work
    packages:
      homebrew:
        - kubectl
        - aws-cli
        - terraform
        - docker-compose
      homebrew_casks:
        - postman
        - zoom
    # Additional dotfiles
    dotfiles:
      - .aws/config
      - .kube/config
    # Platform-specific hooks
    hooks:
      post_apply:
        - command: "brew update && brew upgrade"
          description: "Update Homebrew"
          os: ["macos"]  # Only run on macOS
          fail_on_error: false

  # Personal desktop (Linux)
  personal-desktop:
    extends: base
    packages:
      apt:
        - steam
        - gimp
      homebrew_casks:
        - spotify
        - discord
    hooks:
      post_apply:
        - command: "sudo apt-get update && sudo apt-get upgrade -y"
          description: "Update APT packages"
          os: ["linux"]
          fail_on_error: false

  # Server (minimal, no GUI apps)
  server:
    dotfiles:
      - .bashrc
      - .ssh/config
    packages:
      common:
        - git
        - vim
        - tmux
    hooks:
      post_apply:
        - command: "sudo systemctl enable ssh"
          description: "Enable SSH service"
          os: ["linux"]
          fail_on_error: false
